# Content after a # in a line is ignored

# Definitions of blocks and directives as well as rules are available after the example.

server {
	listen: 8080 # Equivalent to 127.0.0.1:8080

	# Default error pages
	error_page default: ./errors/default.html
	error_page 404: ./errors/404.html

	max_body_size: 1m

	# Path and defaults
	root: ./
	index: index.html

	methods: GET

	route / { # or location / { ... }
		# inherits methods, error_page, index and root directives
	}

	route /data {
		# inherits methods and error_page directives
		error_page 404: ./data/errors/404.html # redefines 404 error page
		root: ./data
		index: data.html, index.html # default file to serve when requested resource is a directory
		autoindex: on # enables directory listing
	}

	route /old-data {
		# inherits methods, error_page, index and root directives
		redirect: /data
	}

	route /upload {
		# inherits index directive
		
		root: ./upload
		methods: GET, POST
		max_body_size: 100m # redefines max_body_size
		upload: on
		upload_dir: ./upload
	}

	route /cgi {
		# inherits index directive
		# inherits methods

		root: ./cgi
		cgi .php: /usr/bin/php-cgi
		cgi .py: /usr/bin/python3
	}
}

# Blocks
# A block consists of a list of directives. The type of block determines which directive can be defined and inherited.
# Format: block { ... }

## route: Represents the configuration for a website route.

## server: Represents the configuration for a website.

# Directives
# A directive consists of a key-value pair separated by ':'. A directive MUST be inside of a block. A directive MUST be allowed in the block context to be interpreted.
# Format: key <arg>: value

## autoindex: Defines if directory listing is allowed. Value MUST be on or off. Default is off. MAY be (re)defined in any block.

## cgi <arg>: The executable to be used for a given cgi. <arg> MUST be a file extension. MAY be defined in a route block.

## error_page <arg>: The path to an error page. <arg> MAY be "default" for the default error page or a status code for a special error page. default MUST be defined in each server block. any error MAY be (re)defined in any block.

## index: The default file to serve if a requested resource is a directory. MUST be defined in each block that cannot inherit one, MAY be (re)defined in any block.

## listen: The interface and port on which the server listens. MUST be defined in each server block. MUST NOT be defined in any other block. The format MUST be either interface:port or port. In the last case, interface will be set to 127.0.0.1.

## max_body_size: The maximum size allowed for a client request body. MUST be defined in each server block. MAY be redefined in any block.

## methods: A list of methods allowed in a given route, separated by commas. MUST be defined in each route block that cannot inherit one, MAY be (re)defined in any block.

## redirect: A path to which the user should be redirected to access the resource. MAY be defined in a route block. MUST NOT be defined in a server block.

## root: The path to the directory corresponding to the given route. MUST be defined in each route block that cannot inherit one, MAY be (re)defined in any block.

## upload: Defines if uploading files is allowed. Value MUST be on or off. Default is off. MAY be defined in any block.

## upload_dir: The directory to which uploaded files are stored. MUST be defined in any block that has upload set to on.


# Rules

## Any absent required directive MUST cause an error
## Any duplicate directive MUST cause an error. A duplicate directive is a directive that has the same key and <arg> as another directive.
## Any invalid value MUST cause an error. Invalid values include, without limiting to, empty values or values that are invalid for the given keys.
## Any format error MUST cause an error. Format errors include, without limiting to, empty route, missing or non-closed brackets, invalid block nesting or line breaks in route/directive declaration.

# Format

## The format is permissive as long as the rules are respected. That means that the number of spaces, tabs or newline between directives and blocks are irrelevant.
## Spaces and tabs are also allowed in directives and blocks declarations.
