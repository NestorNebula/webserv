# Configuration de démo — tous les chemins sous ./demo/
# À lancer depuis la racine du projet : ./webserv conf/default.conf

server {
	listen: 8080

	error_page default: ./demo/errors/default.html
	error_page 404: ./demo/errors/404.html

	max_body_size: 1m

	root: ./demo
	index: index.html

	methods: GET

	route / {
		# hérite de root (./demo), methods, index, error_page
	}

	route /data {
		error_page 404: ./demo/data/errors/404.html
		root: ./demo/data
		index: data.html, index.html
		autoindex: on
	}

	route /old-data {
		root: ./demo
		redirect: /data
	}

	route /upload {
		root: ./demo/upload
		methods: GET, POST
		max_body_size: 100m
		upload: on
		upload_dir: ./demo/upload
	}

	route /cgi {
		root: ./demo/cgi
		cgi .php: /usr/bin/php-cgi
		cgi .py: /usr/bin/python3
	}
}
